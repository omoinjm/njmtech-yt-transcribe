services:
  yt-transcribe:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - INFISICAL_ENABLED=${INFISICAL_ENABLED:-false}
    container_name: yt-transcribe-app
    command: -db
    env_file: .env
    # Mount /tmp so downloaded audio files are written outside the container layer.
    volumes:
      - /tmp:/tmp
    restart: "no"
    environment:
      # Example env vars (set these in .env or your deployment):
      # INFISICAL_ENABLED: "true"
      # INFISICAL_PROJECT_ID: "<project-id>"
      # INFISICAL_ENVIRONMENT: "dev"
      # INFISICAL_UNIVERSAL_AUTH_CLIENT_ID: "<client-id>"
      # INFISICAL_UNIVERSAL_AUTH_CLIENT_SECRET: "<client-secret>"
      # INFISICAL_SITE_URL: "https://app.infisical.com"
      - INFISICAL_ENABLED=${INFISICAL_ENABLED}
      - INFISICAL_PROJECT_ID=${INFISICAL_PROJECT_ID}
      - INFISICAL_ENVIRONMENT=${INFISICAL_ENVIRONMENT}
      - INFISICAL_UNIVERSAL_AUTH_CLIENT_ID=${INFISICAL_UNIVERSAL_AUTH_CLIENT_ID}
      - INFISICAL_UNIVERSAL_AUTH_CLIENT_SECRET=${INFISICAL_UNIVERSAL_AUTH_CLIENT_SECRET}
      - INFISICAL_SITE_URL=${INFISICAL_SITE_URL}
