name: Transcribe Pipeline

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  transcribe:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg cmake build-essential

      - name: Install yt-dlp
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/download/2025.10.22/yt-dlp \
            -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: Cache whisper.cpp build and model
        id: cache-whisper
        uses: actions/cache@v4
        with:
          path: ~/.whisper-cache
          key: whisper-cpp-v1.8.4-base.en

      - name: Build whisper.cpp and download model
        if: steps.cache-whisper.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch v1.8.4 https://github.com/ggml-org/whisper.cpp.git /tmp/whisper.cpp
          cd /tmp/whisper.cpp
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build -j$(nproc)
          sh ./models/download-ggml-model.sh base.en
          mkdir -p ~/.whisper-cache
          cp build/bin/whisper-cli ~/.whisper-cache/
          cp models/ggml-base.en.bin ~/.whisper-cache/

      - name: Install whisper-cli
        run: sudo cp ~/.whisper-cache/whisper-cli /usr/local/bin/whisper-cli

      - name: Build yt-transcribe
        run: go build -o yt-transcribe .

      - name: Run transcription pipeline
        env:
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
          VERCEL_BLOB_API_URL: ${{ secrets.VERCEL_BLOB_API_URL }}
          VERCEL_BLOB_API_TOKEN: ${{ secrets.VERCEL_BLOB_API_TOKEN }}
          WHISPER_MODEL_PATH: /home/runner/.whisper-cache/ggml-base.en.bin
        run: ./yt-transcribe -db
