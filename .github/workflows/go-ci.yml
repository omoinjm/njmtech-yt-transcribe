name: Go Build & Test

on:
  push:
    branches: ["main", "staging", "development"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    env:
      INFISICAL_ENABLED: ${{ secrets.INFISICAL_ENABLED }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.5"

      - name: Install yt-dlp
        run: |
          sudo curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o /usr/local/bin/yt-dlp
          sudo chmod a+rx /usr/local/bin/yt-dlp

      - name: Run Go tests
        run: go test -v ./...

      - name: Build Go binary (conditionally with infisical tag)
        run: |
          if [ "${INFISICAL_ENABLED}" = "true" ]; then
            echo "Building with infisical tag"
            CGO_ENABLED=0 go build -tags=infisical -ldflags='-w -s' -o yt-transcribe
          else
            echo "Building without infisical tag"
            CGO_ENABLED=0 go build -ldflags='-w -s' -o yt-transcribe
          fi

    # Optional: Upload the built binary as an artifact
    # - name: Upload artifact
    #   uses: actions/upload-artifact@v4
    #   with:
    #     name: yt-transcribe-binary
    #     path: yt-transcribe

  docker:
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            INFISICAL_ENABLED=${{ secrets.INFISICAL_ENABLED }}
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/njmtech-yt-transcribe:latest
